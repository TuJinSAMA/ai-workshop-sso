name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Force npmjs registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  docker-and-deploy:
    name: Build Image And Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare image metadata
        id: vars
        shell: bash
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
        run: |
          if [[ -z "${ALIYUN_REGISTRY}" || -z "${ALIYUN_NAMESPACE}" ]]; then
            echo "Missing ALIYUN_REGISTRY / ALIYUN_NAMESPACE secret" >&2
            exit 1
          fi
          IMAGE="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/ai-workshop-sso"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ github.sha }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: deploy/docker-compose.prod.yml,deploy/deploy.sh
          target: /opt/ai-workshop-sso
          overwrite: true

      - name: Run deployment script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /opt/ai-workshop-sso/deploy
            cd /opt/ai-workshop-sso/deploy
            chmod +x ./deploy.sh
            export ALIYUN_USERNAME='${{ secrets.ALIYUN_USERNAME }}'
            export ALIYUN_PASSWORD='${{ secrets.ALIYUN_PASSWORD }}'
            ALIYUN_REGISTRY_INTERNAL='${{ secrets.ALIYUN_REGISTRY_INTERNAL }}'
            ALIYUN_REGISTRY_PUBLIC='${{ secrets.ALIYUN_REGISTRY }}'
            export ALIYUN_REGISTRY="${ALIYUN_REGISTRY_INTERNAL:-$ALIYUN_REGISTRY_PUBLIC}"
            export ALIYUN_NAMESPACE='${{ secrets.ALIYUN_NAMESPACE }}'
            export IMAGE_NAME='ai-workshop-sso'
            export IMAGE_TAG='${{ github.sha }}'
            export APP_ENV_FILE='/opt/ai-workshop-sso/.env.production'
            ./deploy.sh
