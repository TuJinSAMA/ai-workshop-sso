# Local development infrastructure: Postgres only.
# Redis is expected to run natively on the host (the project assumes
# REDIS_URL=redis://127.0.0.1:6379 by default).
# The Next.js app itself runs on the host via `pnpm dev` so HMR works.
#
# Usage:
#   docker compose up -d
#   pnpm prisma migrate dev
#   pnpm dev
#
# To tear down (keeps data volume):    docker compose down
# To wipe data:                        docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-workshop-sso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workshop_sso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_workshop_sso"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
