# Local development infrastructure: Postgres + Redis.
# The Next.js app itself runs on the host via `pnpm dev` so HMR works.
#
# Usage:
#   docker compose up -d
#   pnpm prisma migrate dev
#   pnpm dev
#
# To tear down (keeps data volume):    docker compose down
# To wipe data:                        docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-workshop-sso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workshop_sso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_workshop_sso"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-workshop-sso-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
